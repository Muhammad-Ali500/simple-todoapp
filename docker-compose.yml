services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: robin
      MYSQL_PASSWORD: robin
      MYSQL_DATABASE: robin_db
    depends_on:
      db:
        condition: service_healthy


  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: robin
      MYSQL_DATABASE: robin_db
      MYSQL_USER: robin
      MYSQL_PASSWORD: robin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

